<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Contact| Creative Commons Summit</title>
     <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
      *{
    margin:0 auto;
  }
 .my-logo{
  position:absolute;
  bottom: 0px;
  padding: 5px;
  left: 0px;
 }
 .my-logo img{
  height: 100px;
 }
 body {
    margin:0;
    padding:0;
  background-color:#f4f4f4;
  align-items:center;
  font-family: 'Segoe UI', sans-serif, arial;
height:100vh;
}
.nav-item:hover{
  background-color: blue;
  text-decoration:underline;
}
.navbar .bi {
  font-size: 1.8rem;
    transition: color 0.3s ease;
}

.navbar .bi:hover {
  color: #007bff; /* Bootstrap blue or choose your own */
}

.navbar-brand{
  max-width:120px;
}
.Contact{
    padding:40px;
    border-radius:15px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    max-width:600px;
    width:100%;
    margin:0px auto;
}
.Contact h2{
    text-align:center;
    margin-bottom:30px;
    color:#333;
}
.Contact .form-group {
    margin-bottom: 20px;
}
.Contact label{
    display:block;
    margin-bottom: 6px;
    color:#555;
    font-weight: bold;
}
.Contact input, .Contact textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 16px;
}
.Contact textarea{
    height:100px;
    resize: none;
}
.Contact button {
      width: 100%;
      padding: 12px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .Contact button:hover {
      background-color: #0056b3;
    }
     .form-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }

    .form-footer a {
      color: #007bff;
      margin: 0 8px;
      text-decoration: none;
    }

    .form-footer a:hover {
      text-decoration: underline;
    }
.navbar-brand{
  max-width:120px;
}
.navbar{
  min-height: 100px;
}
</style>
</head>
<body>
      <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-secondary border-bottom shadow-sm px-4 py-3 sticky-top">
    <div class="container">
      <div class="my-logo">
    <a href="contact.html"><img src="AL-logo.png" alt="my logo" class="navbar-brand"></a>
    </div>
     <div class=" hover-underline collapse navbar-collapse justify-content-between d-flex mb-0" id="navbarNav">
      <ul class="navbar-nav me-2 mb-lg-0">
        <li class="nav-item mx-2"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item mx-2"><a class="nav-link" href="About.html">About</a></li>
        <li class="nav-item mx-2"><a class="nav-link" href="Contact.html">Contact</a></li>
 </ul>
    </div>
    </div>
  </nav>
<form class="Contact mt-5 align-items-center bg-light" action="https://formspree.io/f/xvgrjkwq" method="POST">
<h2 class="contact us mt-3 align-items-center ">Contact us</h2>
<div class="form-group">
<label for="firstname">FirstName</label>
<input type="text" id="firstname" name="firstname" placeholder="Firstname..." autocomplete="on" required>
</div>
<div class="form-group">
<label for="lastname">LastName</label>
<input type="text" id="lastname" name="lastname" placeholder="lastname..." autocomplete="on" required>
</div>
<div class="form-group">
<label for="contact">Contact</label>
<input type="tel" id="contact" name="contact" placeholder="contact..." autocomplete="on" required>
</div>
<div class="form-group">
<label for="email">Email</label>
<input type="email" id="email" name="email" placeholder="enter your mail..." autocomplete="on" required>
</div>
<div class="form-group">
<label for="message">Message</label>
<textarea id="message" placeholder="Enter your message here..." required></textarea>
</div>
<button type="submit">Submit</button>
<div class="form-footer">
      Already have an account? <a href="#">Log In</a> |
      <a href="#">Sign Up</a>
    </div>
</form>  
<!-- Footer -->
<footer style="background-color: #222; padding: 10px 0; color: white; text-align: center;">

  </marquee>
</footer>

</body>
</html>
